apiVersion: batch/v1
kind: CronJob
metadata:
  name: stop-env-d
  namespace: automation
spec:
  schedule: "15 18 * * 1-5"
  timeZone: "Africa/Johannesburg"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: env-scheduler
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "Stopping env-d last..."
                  kubectl scale deployment hello-app -n env-d --replicas=0
                  echo "env-d stopped."
