apiVersion: v1
kind: ServiceAccount
metadata:
  name: env-scheduler
  namespace: automation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: env-scheduler
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: env-scheduler
subjects:
  - kind: ServiceAccount
    name: env-scheduler
    namespace: automation
roleRef:
  kind: ClusterRole
  name: env-scheduler
  apiGroup: rbac.authorization.k8s.io
