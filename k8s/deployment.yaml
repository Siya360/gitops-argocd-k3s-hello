apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  namespace: hello-gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      containers:
        - name: hello-app
          image: gitops-hello:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
